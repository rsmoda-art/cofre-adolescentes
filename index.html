<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cofre dos Adolescentes - AD Ipiranga</title>
    <style>
        :root { --primary: #002147; --gold: #d4af37; --bg: #f4f4f4; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); position: relative; }
        
        .header { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        h1 { margin: 0; color: var(--primary); font-size: 1.8rem; text-transform: uppercase; }

        .screen { display: none; padding: 20px; }
        .active { display: block; }

        /* Botões */
        button { padding: 12px 25px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: var(--gold); color: var(--primary); }
        .btn-terminar { background: #d9534f; font-size: 0.7rem; padding: 5px 10px; }

        /* Timer e Dica Grande */
        #pizza-timer { width: 140px; height: 140px; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; border: 5px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .dica-grande { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin: 30px 0; line-height: 1.2; background: #fff8e1; padding: 20px; border-radius: 15px; border: 2px dashed var(--gold); }
        
        /* Área de Resposta Ocultável */
        #painel-resposta { display: none; background: #eee; padding: 20px; border-radius: 15px; margin-top: 20px; border: 2px solid var(--primary); }
        input, select { padding: 12px; margin: 10px; border-radius: 8px; border: 2px solid #ddd; width: 80%; max-width: 350px; font-size: 1.1rem; }

        .castigo-box { background: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 1.1rem; border: 1px solid #ffeeba; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--primary); color: white; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #ddd; font-size: 1.2rem; font-weight: bold; }
        tr:nth-child(even) { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>COFRE DOS ADOLESCENTES</h1>
        <button id="btn-kill" class="btn-terminar" onclick="finalizarJogo()" style="display:none;">TERMINAR</button>
    </div>

    <div id="setup" class="screen active">
        <br><br>
        <button onclick="configurarEIniciar()" style="font-size: 2rem; padding: 30px 60px;">INICIAR PROGRAMA 🔑</button>
        <p style="margin-top:20px; color: #888;">(Equipes e Perguntas serão sorteadas automaticamente)</p>
    </div>

    <div id="game" class="screen">
        <div id="status-turno" style="font-weight: bold; color: var(--gold);">Pergunta 1/8</div>
        
        <div id="pizza-timer"><span id="tempo-texto">120</span>s</div>
        
        <div id="castigo-area" class="castigo-box"></div>
        
        <div id="exibicao-pista" class="dica-grande">
            Aguardando pista...
        </div>

        <div id="painel-resposta">
            <h3 style="margin:0; color: var(--primary);">HORA DE RESPONDER!</h3>
            <select id="select-grupo"></select><br>
            <input type="text" id="resposta-input" placeholder="Quem sou eu?"><br>
            <button onclick="validarResposta()" style="width: 80%; max-width: 350px;">Confirmar Agora</button>
            <div id="feedback" style="margin-top:10px; font-weight:bold;"></div>
        </div>
    </div>

    <div id="results" class="screen">
        <h2 style="color: var(--primary);">🏆 RANKING FINAL</h2>
        <div id="rankings"></div>
        <br>
        <button onclick="location.reload()">NOVO JOGO</button>
    </div>
</div>

<script>
// BANCO DE DADOS COMPLETO (23+ CARTAS CONFORME FOTOS)
const banco = [
    { pistas: ["Sou irmã de Arão. (Ex 15:20)", "Fui seguida por todas as mulheres tocando tambores em louvor ao Senhor.", "Apresentei Joquebede à filha do Faraó.", "Por falar contra meu irmão fiquei leprosa."], resposta: "Miriã", castigo: "Imitar um avião decolando." },
    { pistas: ["O profeta João Batista se vestia igual a mim.", "Matei 450 falsos profetas e em seguida me escondi.", "Fui alimentado duas vezes por um anjo.", "Fui arrebatado em um carro com cavalos de fogo."], resposta: "Elias", castigo: "Imitar um gatinho bebendo leite." },
    { pistas: ["Mardoqueu me adotou como filha.", "Hamã foi enforcado na forca que construiu para meu povo.", "Ganhei a casa de Hamã.", "Estabeleci a festa do Purim."], resposta: "Ester", castigo: "Fazer uma careta." },
    { pistas: ["Eu era um pecador e Jesus me salvou.", "A multidão me impediu de ver a Jesus.", "Fui chefe dos cobradores de impostos.", "Jesus dormiu em minha casa."], resposta: "Zaqueu", castigo: "Abraçar o oponente que estiver vencendo." },
    { pistas: ["Exterminei todos os profetas de Baal.", "Exterminei toda a descendência de Acabe.", "Fui um rei idólatra.", "Mandei lançar Jezabel da janela."], resposta: "Jeú", castigo: "Imitar um macaco com coceira." },
    { pistas: ["Meu pai amava mais meu irmão que a mim.", "Fui o filho preferido da minha mãe.", "Lutei com um anjo e prevaleci.", "Deus trocou meu nome para Israel."], resposta: "Jacó", castigo: "Imitar o som de um carro F1." },
    { pistas: ["O apóstolo Paulo me tinha como verdadeiro filho.", "Recebi duas cartas do apóstolo Paulo.", "Minha mãe se chama Eunice e minha avó Loide.", "Paulo me mandou beber um pouco de vinho."], resposta: "Timóteo", castigo: "Imitar uma galinha comendo milho." },
    { pistas: ["Fui prostituta em Jericó.", "Jesus é meu descendente direto.", "Minha casa era no muro da cidade.", "Ajudamos os espiões de Josué."], resposta: "Raabe", castigo: "Amarrar um pano na cabeça por 1 rodada." },
    { pistas: ["Dormi em meio a uma forte tempestade.", "Pedi ao Senhor que tirasse minha vida.", "Preguei para a cidade de Nínive.", "Fui engolido por um grande peixe."], resposta: "Jonas", castigo: "Imitar um macaco comendo banana." },
    { pistas: ["Desafiei a sabedoria do rei Salomão.", "Fiquei impressionada com o ouro de Israel.", "Dei 4.200 quilos de ouro ao rei.", "Vim de uma terra muito distante."], resposta: "Rainha de Sabá", castigo: "Imitar um trovão forte." },
    { pistas: ["Eu cortava meus cabelos uma vez por ano.", "Mandei queimar o campo de Joabe.", "Meu pai fugiu de mim a pé.", "Morri preso pelos cabelos em uma árvore."], resposta: "Absalão", castigo: "Imitar um lutador de boxe." },
    { pistas: ["Fui esposa do rei Acabe.", "Elias profetizou minha morte terrível.", "Pintei os olhos antes de ser jogada da janela.", "Cães comeram minha carne."], resposta: "Jezabel", castigo: "Equilibrar a bíblia na cabeça por 1 min." },
    { pistas: ["Meu filho morreu nos meus braços com dor de cabeça.", "Mandei fazer um quarto para o profeta Eliseu.", "Meu filho ressuscitou e espirrou 7 vezes.", "Sou de uma cidade chamada Suném."], resposta: "Mulher Sunamita", castigo: "Imitar o rei Davi tocando harpa." },
    { pistas: ["Não me contaminei com a comida do rei.", "Fui lançado na cova dos leões.", "Interpretei o sonho de Nabucodonosor.", "Oravam 3 vezes ao dia com a janela aberta."], resposta: "Daniel", castigo: "Imitar um pintinho batendo asas." },
    { pistas: ["Fui destruído por Satanás com permissão de Deus.", "Minha mulher mandou eu amaldiçoar a Deus.", "Meus amigos achavam que eu estava em pecado.", "Deus me deu tudo em dobro no final."], resposta: "Jó", castigo: "Imitar uma moto dando partida." }
];

let grupos = {"EQUIPE ALFA": 0, "EQUIPE ÔMEGA": 0, "EQUIPE SINAI": 0, "EQUIPE SIÃO": 0};
let cartasSorteio = [];
let cartaAtualIdx = 0;
let pistaAtualIdx = 0;
let intervalTimer;

function configurarEIniciar() {
    // Sorteia as perguntas
    cartasSorteio = [...banco].sort(() => 0.5 - Math.random()).slice(0, 8);
    
    // Configura o select de grupos
    const sel = document.getElementById('select-grupo');
    sel.innerHTML = "";
    Object.keys(grupos).forEach(n => {
        let opt = document.createElement('option');
        opt.value = n; opt.innerText = n;
        sel.appendChild(opt);
    });

    document.getElementById('setup').classList.remove('active');
    document.getElementById('game').classList.add('active');
    document.getElementById('btn-kill').style.display = "block";
    
    carregarCarta();
}

function carregarCarta() {
    if(cartaAtualIdx >= 8) return finalizarJogo();
    
    pistaAtualIdx = 0;
    document.getElementById('status-turno').innerText = `PERGUNTA ${cartaAtualIdx + 1} DE 8`;
    document.getElementById('castigo-area').innerText = "REGRA DO RODAPÉ: " + cartasSorteio[cartaAtualIdx].castigo;
    document.getElementById('exibicao-pista').innerText = "PREPAREM-SE...";
    document.getElementById('painel-resposta').style.display = "none";
    document.getElementById('feedback').innerText = "";
    
    iniciarFase(120, true); // Começa pelo rodapé (2 min)
}

function iniciarFase(segundos, isRodape) {
    clearInterval(intervalTimer);
    let tempo = segundos;
    document.getElementById('painel-resposta').style.display = "none"; // Garante que some ao mudar fase

    intervalTimer = setInterval(() => {
        tempo--;
        document.getElementById('tempo-texto').innerText = tempo;
        document.getElementById('pizza-timer').style.background = `conic-gradient(var(--gold) ${(tempo/segundos)*100}%, #eee 0%)`;
        
        if(tempo <= 0) {
            clearInterval(intervalTimer);
            if(isRodape) {
                // Terminou o rodapé, libera a primeira pista
                liberarProximaPista();
            } else {
                // Terminou o tempo de uma pista, abre o campo de resposta
                mostrarPainelResposta();
            }
        }
    }, 1000);
}

function liberarProximaPista() {
    document.getElementById('exibicao-pista').innerText = cartasSorteio[cartaAtualIdx].pistas[pistaAtualIdx];
    iniciarFase(300, false); // 5 minutos para os adolescentes pensarem (300s)
}

function mostrarPainelResposta() {
    document.getElementById('painel-resposta').style.display = "block";
    // Se não acertarem nesta rodada, após responder (ou se passar o tempo), vai para a próxima dica
}

function validarResposta() {
    const input = document.getElementById('resposta-input').value.trim();
    const respCorreta = cartasSorteio[cartaAtualIdx].resposta;
    const g = document.getElementById('select-grupo').value;
    const norm = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    
    if(norm(input) === norm(respCorreta)) {
        let pts = 4 - pistaAtualIdx;
        grupos[g] += pts;
        document.getElementById('feedback').innerHTML = `<span style="color:green">✅ CORRETO! +${pts} PONTOS PARA ${g}</span>`;
        setTimeout(() => {
            cartaAtualIdx++;
            document.getElementById('resposta-input').value="";
            carregarCarta();
        }, 3000);
    } else {
        grupos[g] -= 1;
        document.getElementById('feedback').innerHTML = `<span style="color:red">❌ ERRADO! -1 PONTO PARA ${g}. TENTE A PRÓXIMA DICA!</span>`;
        
        // Se errar e ainda houver pistas, libera a próxima dica após 2 segundos
        setTimeout(() => {
            if(pistaAtualIdx < 3) {
                pistaAtualIdx++;
                liberarProximaPista();
            } else {
                // Se era a última pista, pula para próxima carta
                cartaAtualIdx++;
                carregarCarta();
            }
        }, 2000);
    }
}

function finalizarJogo() {
    clearInterval(intervalTimer);
    document.getElementById('game').classList.remove('active');
    document.getElementById('setup').classList.remove('active');
    document.getElementById('results').classList.add('active');
    document.getElementById('btn-kill').style.display = "none";
    
    const rank = Object.entries(grupos).sort((a,b) => b[1]-a[1]);
    let h = "<table><tr><th>POSIÇÃO</th><th>EQUIPE</th><th>PONTOS</th></tr>";
    rank.forEach((r,i) => {
        h += `<tr><td>${i+1}º</td><td>${r[0]}</td><td>${r[1]} pts</td></tr>`;
    });
    document.getElementById('rankings').innerHTML = h + "</table>";
}
</script>
</body>
</html>
