<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cofre dos Adolescentes - AD Ipiranga</title>
    <style>
        :root { --primary: #002147; --gold: #d4af37; --bg: #f4f4f4; --text: #333; --danger: #d9534f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); position: relative; }
        .header { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--primary); font-size: 1.6rem; text-transform: uppercase; }
        .screen { display: none; padding: 10px; }
        .active { display: block; }
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; text-transform: uppercase; transition: 0.3s; margin: 5px; }
        button:hover { background: var(--gold); color: var(--primary); }
        .btn-passar { background: #5bc0de; }
        .btn-repassar { background: #f0ad4e; }
        .btn-terminar { background: var(--danger); font-size: 0.7rem; padding: 5px 10px; border-radius: 5px; color: white; }
        #pizza-timer { width: 130px; height: 130px; border-radius: 50%; margin: 15px auto; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; border: 5px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .box-pergunta { font-size: 1.8rem; font-weight: bold; color: var(--primary); margin: 15px 0; background: #fff8e1; padding: 20px; border-radius: 15px; border: 2px dashed var(--gold); min-height: 100px; display: flex; align-items: center; justify-content: center; }
        input, select { padding: 12px; margin: 10px; border-radius: 8px; border: 2px solid #ddd; width: 85%; max-width: 400px; font-size: 1.1rem; }
        .trolagem-box { background: #f2dede; color: #a94442; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; border: 1px solid #ebccd1; line-height: 1.4; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--primary); color: white; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #ddd; font-size: 1.1rem; font-weight: bold; }
        .highlight-time { font-size: 1.8rem; color: var(--gold); text-shadow: 1px 1px 2px #000; }
        .opcoes-quiz button { width: 90%; max-width: 500px; text-align: left; text-transform: none; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>COFRE DOS ADOLESCENTES</h1>
        <button id="btn-kill" class="btn-terminar" onclick="finalizarJogo()" style="display:none;">TERMINAR</button>
    </div>

    <div id="setup" class="screen active">
        <h3 style="color: var(--primary);">MODALIDADE DO ENCONTRO</h3>
        <select id="tipo-jogo">
            <option value="quem-sou-eu">QUEM SOU EU? (Pistas Progressivas)</option>
            <option value="quiz-biblico">QUIZ BÍBLICO (Múltipla Escolha)</option>
            <option value="passa-repassa">PERGUNTAS E RESPOSTAS (Passa/Repassa)</option>
        </select>
        <h3 style="color: var(--primary);">EQUIPES</h3>
        <input type="text" id="t1" placeholder="Time 1"><br>
        <input type="text" id="t2" placeholder="Time 2"><br>
        <input type="text" id="t3" placeholder="Time 3"><br>
        <input type="text" id="t4" placeholder="Time 4"><br>
        <input type="text" id="t5" placeholder="Time 5"><br><br>
        <button onclick="iniciarPrograma()" style="width: 85%; font-size: 1.4rem;">ABRIR COFRE 🔑</button>
    </div>

    <div id="game" class="screen">
        <div id="status-turno" style="font-weight: bold; color: var(--gold);"></div>
        <div id="pizza-timer"><span id="tempo-texto">0</span>s</div>
        
        <div id="castigo-area" class="trolagem-box" style="display:none;"></div>
        
        <div id="texto-pergunta" class="box-pergunta"></div>

        <div id="painel-acoes">
            <p>VEZ DO TIME: <br><strong id="time-atual-nome" class="highlight-time">---</strong></p>
            
            <div id="controles-quem-sou" style="display:none;">
                <input type="text" id="input-quem" placeholder="Resposta da carta..."><br>
                <button onclick="validarQuemSou()">RESPONDER</button>
            </div>

            <div id="controles-quiz" class="opcoes-quiz" style="display:none;">
                <div id="opcoes-quiz-btns"></div>
            </div>

            <div id="controles-passa" style="display:none;">
                <input type="text" id="input-passa" placeholder="Sua resposta..."><br>
                <button onclick="validarPassa()">RESPONDER</button>
                <button id="btn-acao-passar" class="btn-passar" onclick="passarVez()">PASSAR</button>
            </div>
        </div>
        
        <div id="feedback" style="margin-top:15px; font-weight:bold; min-height: 40px;"></div>
    </div>

    <div id="results" class="screen">
        <h2 style="color: var(--primary);">🏆 CLASSIFICAÇÃO FINAL</h2>
        <div id="rankings"></div><br>
        <button onclick="location.reload()">NOVO JOGO</button>
    </div>
</div>

    { pergunta: "Em qual rio João Batista batizou Jesus?", resposta: "Rio Jordão", ref: "Mt 3:13", trolagem: "Desamarrar e amarrar o cadarço de alguém." },
    { pergunta: "Qual foi o primeiro milagre realizado por Jesus?", resposta: "Transformar água em vinho", ref: "Jo 2:1-11", trolagem: "Desamarrar e amarrar o cadarço de alguém." },
    { pergunta: "O que o profeta Eliseu usou para fazer o ferro de um machado flutuar?", resposta: "Um pau (pedaço de madeira)", ref: "2 Rs 6:5-6", trolagem: "Desamarrar e amarrar o cadarço de alguém." },
    { pergunta: "Qual era a nacionalidade do gigante Golias?", resposta: "Filisteu", ref: "1 Sm 17: 4-10", trolagem: "Ficar descalço por uma rodada." },
    { pergunta: "Os Efraimitas foram degolados por não conseguirem pronunciar qual palavra?", resposta: "Chibolete", ref: "Jz 12: 5-6", trolagem: "Ficar descalço por uma rodada." },
    { pergunta: "O que o Senhor escreveu com seu próprio dedo em tábuas de pedra?", resposta: "A lei (10 Mandamentos)", ref: "Êx 24: 12", trolagem: "Ficar descalço por uma rodada." },
    { pergunta: "Qual foi o primeiro pássaro solto após o dilúvio?", resposta: "Corvo", ref: "Gn 8: 7-8", trolagem: "Imitar um bezerro berrando." },
    { pergunta: "Quem libertou o povo hebreu da escravidão no Egito?", resposta: "Moisés", ref: "Êx 3: 10-13", trolagem: "Imitar um bezerro berrando." },
    { pergunta: "Quantos discípulos de Jesus eram pescadores?", resposta: "Quatro", ref: "Mc 1: 16-20", trolagem: "Imitar um bezerro berrando." },
    { pergunta: "O que o rei Senaqueribe ordenou que os israelitas comessem e bebessem?", resposta: "Fezes e urina", ref: "2 Rs 18: 13 e 27", trolagem: "Dar 3 giros em torno do próprio eixo." },
    { pergunta: "A qual discípulo Paulo mandou beber um pouco de vinho?", resposta: "Timóteo", ref: "1 Tm 5: 23", trolagem: "Dar 3 giros em torno do próprio eixo." },
    { pergunta: "O que Jesus comeu após ter ressuscitado para provar que não era um espírito?", resposta: "Peixe e favo de mel", ref: "Lc 24: 36-43", trolagem: "Dar 3 giros em torno do próprio eixo." }
];

// --- LÓGICA DO SISTEMA ---

let grupos = {}; let deck = []; let idx = 0; let idxPista = 0;
let tipo = ""; let times = []; let timer;
let timeOriginal = ""; let statusPassa = "direta";

function iniciarPrograma() {
    times = [1,2,3,4,5].map(i => document.getElementById('t'+i).value).filter(t => t.trim() !== "");
    if(times.length < 1) return alert("Cadastre pelo menos 1 time!");
    
    tipo = document.getElementById('tipo-jogo').value;
    times.forEach(t => grupos[t] = 0);
    
    document.getElementById('setup').classList.remove('active');
    document.getElementById('game').classList.add('active');
    document.getElementById('btn-kill').style.display = "block";

    if(tipo === "quem-sou-eu") deck = [...bancoQuemSou].sort(() => 0.5-Math.random()).slice(0,8);
    else if(tipo === "quiz-biblico") deck = [...bancoQuiz].sort(() => 0.5-Math.random()).slice(0,10);
    else deck = [...bancoPassa].sort(() => 0.5-Math.random()).slice(0,12);

    idx = 0; carregarRodada();
}

function carregarRodada() {
    if(idx >= deck.length) return finalizarJogo();
    clearInterval(timer);
    document.getElementById('feedback').innerText = "";
    document.getElementById('castigo-area').style.display = "none";
    document.getElementById('status-turno').innerText = `RODADA ${idx + 1} DE ${deck.length}`;

    // Reset de painéis
    document.getElementById('controles-quem-sou').style.display = "none";
    document.getElementById('controles-quiz').style.display = "none";
    document.getElementById('controles-passa').style.display = "none";

    if(tipo === "quem-sou-eu") {
        document.getElementById('controles-quem-sou').style.display = "block";
        idxPista = 0;
        document.getElementById('time-atual-nome').innerText = times[idx % times.length];
        exibirPistaQuem();
    } 
    else if(tipo === "quiz-biblico") {
        document.getElementById('controles-quiz').style.display = "block";
        const p = deck[idx];
        document.getElementById('texto-pergunta').innerText = p.pergunta;
        const timeVez = times[idx % times.length];
        document.getElementById('time-atual-nome').innerText = timeVez;
        
        const area = document.getElementById('opcoes-quiz-btns');
        area.innerHTML = "";
        p.opcoes.forEach((o, i) => {
            let b = document.createElement('button'); b.innerText = o;
            b.onclick = () => validarQuiz(i, timeVez); area.appendChild(b);
        });
        iniciarRelogio(60);
    } 
    else { // PASSA REPASSA
        document.getElementById('controles-passa').style.display = "block";
        statusPassa = "direta";
        timeOriginal = times[Math.floor(Math.random() * times.length)];
        document.getElementById('time-atual-nome').innerText = timeOriginal;
        document.getElementById('texto-pergunta').innerText = deck[idx].pergunta;
        document.getElementById('btn-acao-passar').innerText = "PASSAR";
        document.getElementById('btn-acao-passar').className = "btn-passar";
        document.getElementById('btn-acao-passar').style.display = "inline-block";
        iniciarRelogio(120);
    }
}

// --- PASSA REPASSA ---
function validarPassa() {
    const input = document.getElementById('input-passa').value.trim();
    const correta = deck[idx].resposta;
    const timeAtual = document.getElementById('time-atual-nome').innerText;
    const norm = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

    if(norm(input) === norm(correta)) {
        let pts = statusPassa === "direta" ? 5 : (statusPassa === "passa" ? 3 : 1);
        grupos[timeAtual] += pts;
        msg(`<span style="color:green">✅ CORRETO! +${pts} PONTOS. (${deck[idx].ref || ''})</span>`, true);
    } else {
        grupos[timeAtual] -= 2;
        msg(`<span style="color:red">❌ ERROU! -2 PONTOS. TROLAGEM: ${deck[idx].trolagem}</span>`, true);
    }
}

function passarVez() {
    if(statusPassa === "direta") {
        statusPassa = "passa";
        const outros = times.filter(t => t !== timeOriginal);
        const sorteado = outros[Math.floor(Math.random() * outros.length)] || timeOriginal;
        document.getElementById('time-atual-nome').innerText = sorteado;
        document.getElementById('btn-acao-passar').innerText = "REPASSAR";
        document.getElementById('btn-acao-passar').className = "btn-repassar";
        iniciarRelogio(60);
    } else if(statusPassa === "passa") {
        statusPassa = "repassa";
        document.getElementById('time-atual-nome').innerText = timeOriginal;
        document.getElementById('btn-acao-passar').style.display = "none";
        iniciarRelogio(60);
    }
}

// --- QUEM SOU EU ---
function validarQuemSou() {
    const input = document.getElementById('input-quem').value.trim();
    const time = document.getElementById('time-atual-nome').innerText;
    const norm = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    if(norm(input) === norm(deck[idx].resposta)) {
        let p = 4 - idxPista; grupos[time] += p;
        msg(`<span style="color:green">✅ CORRETO! +${p} PONTOS</span>`, true);
    } else {
        grupos[time] -= 1;
        msg(`<span style="color:red">❌ ERRADO! -1 PTO. RODAPÉ: ${deck[idx].castigo}</span>`, false);
    }
}

function exibirPistaQuem() {
    document.getElementById('texto-pergunta').innerText = deck[idx].pistas[idxPista];
    const ts = [60, 90, 120, 150]; iniciarRelogio(ts[idxPista]);
}

// --- QUIZ ---
function validarQuiz(i, time) {
    const p = deck[idx];
    if(i === p.correta) {
        grupos[time] += 2;
        msg(`<span style="color:green">✅ CORRETO! +2 PONTOS (${p.ref})</span>`, true);
    } else {
        grupos[time] -= 1;
        msg(`<span style="color:red">❌ ERROU! -1 PTO. CASTIGO: ${p.castigo}</span>`, true);
    }
}

// --- CORE ---
function msg(m, proxima) {
    document.getElementById('feedback').innerHTML = m;
    if(proxima) {
        clearInterval(timer);
        setTimeout(() => { 
            idx++; 
            if(document.getElementById('input-passa')) document.getElementById('input-passa').value = "";
            if(document.getElementById('input-quem')) document.getElementById('input-quem').value = "";
            carregarRodada(); 
        }, 3500);
    }
}

function iniciarRelogio(seg) {
    clearInterval(timer); let t = seg;
    timer = setInterval(() => {
        t--; document.getElementById('tempo-texto').innerText = t;
        document.getElementById('pizza-timer').style.background = `conic-gradient(var(--gold) ${(t/seg)*100}%, #eee 0%)`;
        if(t <= 0) {
            clearInterval(timer);
            if(tipo === "passa-repassa") {
                const timeAtual = document.getElementById('time-atual-nome').innerText;
                grupos[timeAtual] -= 2;
                msg(`<span style="color:red">⏱️ TEMPO ESGOTADO! -2 PONTOS. TROLAGEM: ${deck[idx].trolagem}</span>`, true);
            } else if(tipo === "quem-sou-eu") {
                if(idxPista < 3) { idxPista++; exibirPistaQuem(); }
                else { idx++; carregarRodada(); }
            } else { idx++; carregarRodada(); }
        }
    }, 1000);
}

function finalizarJogo() {
    clearInterval(timer);
    document.getElementById('game').classList.remove('active');
    document.getElementById('results').classList.add('active');
    document.getElementById('btn-kill').style.display = "none";
    const r = Object.entries(grupos).sort((a,b) => b[1]-a[1]);
    let h = "<table><tr><th>POSIÇÃO</th><th>EQUIPE</th><th>PONTOS TOTAL</th></tr>";
    r.forEach((v,i) => h += `<tr><td>${i+1}º</td><td>${v[0]}</td><td>${v[1]} pts</td></tr>`);
    document.getElementById('rankings').innerHTML = h + "</table>";
}
</script>
