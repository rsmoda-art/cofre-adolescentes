<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cofre dos Adolescentes - AD Ipiranga</title>
    <style>
        :root { --primary: #8b0000; --gold: #ffd700; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .setup-screen, .game-screen, .results-screen { display: none; background: #333; padding: 20px; border-radius: 15px; border: 3px solid var(--gold); }
        .active { display: block; }
        input, select { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #e6c200; }
        
        #pizza-timer { width: 150px; height: 150px; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; }
        .pista-box { background: #444; padding: 15px; margin: 10px 0; border-left: 5px solid var(--gold); text-align: left; }
        .rodapé { font-style: italic; color: #bbb; border-top: 1px dashed #777; padding-top: 10px; margin-top: 20px; }
        .error-msg { color: #ff4d4d; font-weight: bold; }
        .success-msg { color: #4dff4d; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔒 COFRE DOS ADOLESCENTES</h1>

    <div id="setup" class="setup-screen active">
        <h3>Cadastro de Grupos</h3>
        <input type="text" id="g1" placeholder="Nome Grupo 1">
        <input type="text" id="g2" placeholder="Nome Grupo 2"><br>
        <input type="text" id="g3" placeholder="Nome Grupo 3">
        <input type="text" id="g4" placeholder="Nome Grupo 4"><br><br>
        <button onclick="iniciarJogo()">INICIAR PROGRAMA</button>
    </div>

    <div id="game" class="game-screen">
        <div id="status-turno">Pergunta 1 de 8</div>
        <div id="pizza-timer">
            <span id="tempo-texto">300</span>s
        </div>
        <div id="castigo-area" class="rodapé"></div>
        <div id="pistas-container"></div>
        
        <hr>
        <div id="feedback"></div>
        <select id="select-grupo"></select>
        <input type="text" id="resposta-input" placeholder="Quem sou eu?">
        <button onclick="validarResposta()">RESPONDER</button>
    </div>

    <div id="results" class="results-screen">
        <h2>Placar Final</h2>
        <div id="rankings"></div>
        <br>
        <button onclick="location.reload()">NOVO JOGO</button>
    </div>
</div>

<script>
// Banco de Cartas (Digitalizado)
const banco = [
    { pistas: ["Sou irmã de Arão. (Ex 15:20)", "Fui seguida por todas as mulheres tocando tambores em louvor ao Senhor. (Ex 15:20-21)", "Apresentei Joquebede à filha do Faraó para amamentar seu filho Moisés. (Ex 2:5-10)", "Por falar contra meu irmão fiquei leprosa. (Nm 12:5-10)"], resposta: "Miriã", castigo: "Se errar você deverá imitar um avião decolando." },
    { pistas: ["O profeta João Batista se vestia igual a mim. (2 Rs 1:7-8)", "Matei 450 falsos profetas e em seguida me escondi por temer uma mulher. (1 Rs 18:22 e 19:1-4)", "Fui alimentado duas vezes por um anjo do Senhor. (1 Rs 19:5-7)", "Fui arrebatado em um carro com cavalos de fogo. (2 Rs 2:11)"], resposta: "Elias", castigo: "Se errar você deverá imitar um gatinho bebendo leite." },
    { pistas: ["Mardoqueu me adotou como filha. (Et 2:7)", "Por minha causa Hamã foi enforcado na forca que ele mesmo construiu. (Et 7:1-10)", "Depois que Hamã foi enforcado ganhei a sua casa. (Et 8:1)", "Estabeleci a festa do Purim. (Et 9:25-32)"], resposta: "Ester", castigo: "Se errar você deverá fazer uma careta." },
    { pistas: ["Eu era um pecador e Jesus me salvou. (Lc 19:7-9)", "A multidão me impediu de ver a Jesus. (Lc 19:3)", "Fui chefe dos cobradores de impostos. (Lc 19:2)", "Jesus dormiu em minha casa. (Lc 19:5)"], resposta: "Zaqueu", castigo: "Se errar você deverá abraçar o oponente que estiver vencendo." },
    { pistas: ["Eu provoquei a ira de Deus mais do que todos os reis de Israel. (1 Rs 16:33)", "Sou filho do rei Onri. (1 Rs 16:30)", "Eu reinei sobre Israel e Samaria por 22 anos. (1 Rs 16:29)", "Fui marido de Jezabel. (1 Rs 21:25)"], resposta: "Acabe", castigo: "Se errar você deverá imitar uma borboleta." },
    { pistas: ["Meu filho morreu em meus braços com uma forte dor de cabeça. (2 Rs 4:19-20)", "Após ressuscitar, meu filho espirrou sete vezes. (2 Rs 4:19-20)", "Mandei construir e mobiliar um quarto para hospedar um santo homem de Deus. (2 Rs 4:8-10)", "Repreendi o profeta Eliseu pela morte de meu filho. (2 Rs 4:27-28)"], resposta: "Mulher Sunamita", castigo: "Se errar você deverá imitar o rei Davi tocando harpa." },
    { pistas: ["Não me contaminei com a comida nem com a bebida do rei da Babilônia. (Dn 1:1,8)", "Satanás impediu por 21 dias que o anjo Gabriel respondesse minha oração. (Dn 10:12-15)", "Fui jovem de boa aparência e instruído em sabedoria. (Dn 1:3-6)", "Por orar ao meu Deus fui lançado na cova dos leões. (Dn 6:11-17)"], resposta: "Daniel", castigo: "Se errar você deverá imitar um pintinho batendo asas." },
    { pistas: ["Deus usou um monstro como exemplo para me exortar. (Jó cap: 41)", "Minha oração livrou meus três amigos da morte. (Jó 42:7-9)", "Deus permitiu que Satanás devastasse minha vida. (Jó 2:1-10)", "Minha mulher sugeriu que eu amaldiçoasse a Deus e eu a repreendi. (Jó 2:9-10)"], resposta: "Jó", castigo: "Se errar você deverá imitar uma moto dando partida." }
];

let grupos = {};
let cartasSorteio = [];
let cartaAtualIdx = 0;
let pistaAtualIdx = 0;
let tempoRestante = 300;
let intervalTimer;

function iniciarJogo() {
    const nomes = [document.getElementById('g1').value, document.getElementById('g2').value, document.getElementById('g3').value, document.getElementById('g4').value].filter(n => n !== "");
    if(nomes.length === 0) return alert("Insira ao menos 1 grupo.");
    
    nomes.forEach(n => { grupos[n] = 0; });
    atualizarSelectGrupos(nomes);
    
    cartasSorteio = [...banco].sort(() => 0.5 - Math.random()).slice(0, 8);
    
    document.getElementById('setup').classList.remove('active');
    document.getElementById('game').classList.add('active');
    
    carregarCarta();
}

function atualizarSelectGrupos(nomes) {
    const sel = document.getElementById('select-grupo');
    sel.innerHTML = "";
    nomes.forEach(n => {
        let opt = document.createElement('option');
        opt.value = n; opt.innerText = n;
        sel.appendChild(opt);
    });
}

function carregarCarta() {
    if(cartaAtualIdx >= 8) return finalizarJogo();
    
    pistaAtualIdx = 0;
    document.getElementById('status-turno').innerText = `Pergunta ${cartaAtualIdx + 1} de 8`;
    document.getElementById('pistas-container').innerHTML = "";
    document.getElementById('castigo-area').innerText = "Regra do Rodapé: " + cartasSorteio[cartaAtualIdx].castigo;
    document.getElementById('feedback').innerHTML = "";
    
    // Inicia cronômetro de 2 minutos para o rodapé antes da primeira pista
    iniciarFase(120, true);
}

function iniciarFase(segundos, isRodape) {
    clearInterval(intervalTimer);
    tempoRestante = segundos;
    
    intervalTimer = setInterval(() => {
        tempoRestante--;
        const pizza = document.getElementById('pizza-timer');
        const porcentagem = (tempoRestante / segundos) * 100;
        pizza.style.background = `conic-gradient(#ffd700 ${porcentagem}%, #444 0%)`;
        document.getElementById('tempo-texto').innerText = tempoRestante;
        
        if(tempoRestante <= 0) {
            clearInterval(intervalTimer);
            if(isRodape || pistaAtualIdx < 3) {
                if(!isRodape) pistaAtualIdx++;
                liberarProximaPista();
            }
        }
    }, 1000);
}

function liberarProximaPista() {
    const pistaDiv = document.createElement('div');
    pistaDiv.className = "pista-box";
    pistaDiv.innerHTML = `<strong>Dica ${pistaAtualIdx + 1} (${4 - pistaAtualIdx} pontos):</strong><br>${cartasSorteio[cartaAtualIdx].pistas[pistaAtualIdx]}`;
    document.getElementById('pistas-container').appendChild(pistaDiv);
    iniciarFase(300, false);
}

function validarResposta() {
    const input = document.getElementById('resposta-input').value.trim();
    const grupoSelt = document.getElementById('select-grupo').value;
    const respostaCorreta = cartasSorteio[cartaAtualIdx].resposta;
    
    // Normalização básica (remove acentos e case)
    const normalize = str => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

    if(normalize(input) === normalize(respostaCorreta)) {
        const pontos = 4 - pistaAtualIdx;
        grupos[grupoSelt] += pontos;
        document.getElementById('feedback').innerHTML = `<span class="success-msg">ACERTOU! +${pontos} pontos para ${grupoSelt}</span>`;
        clearInterval(intervalTimer);
        setTimeout(() => {
            cartaAtualIdx++;
            document.getElementById('resposta-input').value = "";
            carregarCarta();
        }, 2000);
    } else {
        grupos[grupoSelt] -= 1;
        document.getElementById('feedback').innerHTML = `<span class="error-msg">ERROU! -1 ponto para ${grupoSelt}.</span>`;
    }
}

function finalizarJogo() {
    document.getElementById('game').classList.remove('active');
    document.getElementById('results').classList.add('active');
    
    const ranking = Object.entries(grupos).sort((a,b) => b[1] - a[1]);
    let html = "<table><tr><th>Posição</th><th>Grupo</th><th>Pontos</th></tr>";
    ranking.forEach((r, i) => {
        html += `<tr><td>${i+1}º</td><td>${r[0]}</td><td>${r[1]}</td></tr>`;
    });
    document.getElementById('rankings').innerHTML = html + "</table>";
}
</script>
</body>
</html>
